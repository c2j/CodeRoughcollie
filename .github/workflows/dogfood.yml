name: Dogfood

on:
  pull_request:
    branches: [main]

jobs:
  self-audit:
    name: CodeRoughcollie Self-Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          ssh-key: ${{ secrets.CR_RULES_DEPLOY_KEY }}

      # TODO: v0.1.0 发布后替换为下载预编译二进制
      - name: Build coderc from source
        run: |
          cargo build --release -p cr-cli
          sudo cp target/release/coderc /usr/local/bin/

      - name: Run self-audit
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }})
          if [[ -z "$FILES" ]]; then
            echo "## CodeRoughcollie Self-Audit" > audit-report.md
            echo "" >> audit-report.md
            echo "No file changes against \`${{ github.base_ref }}\`." >> audit-report.md
            exit 0
          fi
          FILES_CSV=$(echo "$FILES" | tr '\n' ',' | sed 's/,$//')
          coderc audit \
            --config .github/dogfood.roughcollie.toml \
            --baseline origin/${{ github.base_ref }} \
            --files "$FILES_CSV" \
            --output-format markdown \
            --output-path audit-report.md

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '## CodeRoughcollie Self-Audit\n\nSelf-audit did not produce a report (build or execution failed).';
            if (fs.existsSync('audit-report.md')) {
              report = fs.readFileSync('audit-report.md', 'utf8');
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
