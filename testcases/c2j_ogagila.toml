# CodeRoughcollie 示例配置
# 项目: c2j/ogagila
# 仓库: http://github.com/c2j/ogagila
#
# 用法:
#   1. 复制本文件到项目根目录并重命名为 .roughcollie.toml
#   2. 设置环境变量 OGAGILA_DB_PASSWORD（见下方 password_env）
#   3. 执行 `coderc audit --project ogagila --baseline main`

# === 数据库定义（命名 map）===

[databases.gaussdb-local]
enabled = true
host = "localhost"
port = 5432
database = "pagila"
username = "gaussdb"
# 密码解析（当前机制：环境变量）
# TODO(keyring): 计划改为 OS keyring 集成（macOS Keychain / Windows Credential Manager /
#   Linux Secret Service）。落地需：
#   1. cr-config::DatabaseConfig 增加 password_keyring_service / password_keyring_account
#   2. cr-cli 密码解析点（main.rs:441）在 std::env::var 之外增加 keyring 分支
#   3. Cargo.toml 增加 keyring crate 依赖
#   注意：当前 schema 有 #[serde(deny_unknown_fields)]，未实现的字段会导致解析失败，
#   故此处暂不添加 keyring 字段，保留 password_env 作为可用机制。
password = "Enmo@123"
ssl_mode = "disable"
auth_method = "sha256"

[databases.gaussdb-local.explain]
timeout_seconds = 30
max_cost_warning = 10000
max_cost_critical = 50000
buffers_threshold = 100000
enable_analyze = true
enable_buffers = true

[databases.gaussdb-local.security]
enforce_readonly = true
allowed_commands = ["EXPLAIN", "SET", "SHOW"]

# === 项目定义 ===

[projects."c2j/ogagila"]
# 远程仓库: http://github.com/c2j/ogagila
# git_repo 为本地 clone 后的工作目录（默认 CWD）
git_repo = "c2j/ogagila"
project_type = "gaussdb-sql"
baseline = "main"
database = "gaussdb-local"

# === 全局规则 ===

[rules.ogexplain]
preset = "all"

[rules.astgrep]
preset = ["gaussdb-security"]
severity_threshold = "warning"

[rules.complexity]
enabled = true
baseline_compare = true
warning_delta = 10
critical_delta = 25

# === 输出 ===

[output]
format = "markdown"
path = "./audit-report.md"
exit_code_on_critical = 1
exit_code_on_warning = 0
